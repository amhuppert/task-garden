        CountryImpactList, TradePolicyCountryMap, ProductImpactList, HsCodePanel"
    reuse_candidates: []
    notes: Field names and final request shape are still soft until this story settles.
  - id: artemis_v2_access_and_coexistence
    title: Route Gating
    summary: Introduce the new V2 feature flag, require hasItariffAddOn customer config for
      access, and keep V1 and V2 coexisting safely on the shared /itariffs route until
      V2 is released. This is app-integration work and should not block isolated
      service, hook, or component implementation.
    lane: frontend_artemis
    status: planned
    priority: p0
    depends_on: []
    tags:
      - frontend
      - gating
      - routing
      - coexistence
    deliverables:
      - New enableItariffV2 LaunchDarkly flag
      - Route-level switch choosing V1 or V2 on /itariffs
      - Side-nav and entry-point gating updated to use add-on plus feature flags
      - "React components: ITariffV2RouteGate"
    reuse_candidates:
      - src/pages/portal/[authOrgSlug]/itariffs.tsx
      - src/data/contexts/customer-config.tsx
      - flags.ts
    notes: "Access is dual-gated: customer config decides entitlement, flag decides rollout."
  - id: artemis_trade_policy_frontend_foundation
    title: Service Foundation
    summary: Define a UI-owned trade-policy domain contract, expose only the minimal
      CQE-style pagination semantics the UI needs, and stand up mock-backed hooks and
      fixtures so component work can proceed before backend fields settle.
    lane: frontend_artemis
    status: planned
    priority: p0
    depends_on: []
    tags:
      - frontend
      - foundation
      - data_layer
      - service_pattern
      - mocks
    deliverables:
      - Zod schemas and FE types for policy list items, detail objects, read status, and
        route state
      - TradePolicy V2 service interface that hides CQE field names, request builders,
        and endpoint-specific payloads
      - Paginated result shape that preserves only CQE cursor and total-count semantics
        needed by the UI
      - Mock fixtures, base mock service, and service-provider registration for
        Storybook and tests
      - React Query hooks and query keys built strictly against the service interface
      - Feature tags and route-parameter helpers for V2 list and detail state
      - "React components: TradePolicyViewProvider"
    reuse_candidates:
      - docs/service-pattern.md
      - docs/service-pattern-checklist.md
      - src/services/dimensions.ts
      - src/services/reputational-risk-events.ts
      - src/services/service-provider.tsx
      - src/components/views/tariff-explorer/tariff-explorer-routing.tsx
      - src/schemas/route-parameters/tariff-filters.ts
    notes: The current tariff-explorer service is a reuse reference only, not the contract
      model for V2. Components and hooks should code against the new V2 interface and
      mock implementation first, with live CQE mapping deferred to a later adapter task.
  - id: artemis_trade_policy_live_service_adapter
    title: Live Service Adapter
    summary: Once the backend contract settles, implement the production service that maps
      CQE and read-status endpoints into the UI-owned V2 trade-policy interface without
      leaking backend request or field details into hooks or components.
    lane: frontend_artemis
    status: blocked
    priority: p0
    depends_on:
      - artemis_trade_policy_frontend_foundation
      - backend_trade_policy_cqe_cleanup
      - backend_read_status_endpoints
    tags:
      - frontend
      - data_layer
      - service_pattern
      - api_integration
      - dependency
    deliverables:
      - Production TradePolicy V2 service implementation wired to CQE and read-status
        endpoints
      - Mapping layer from backend response shapes into frontend policy list, detail,
        and read-status types
      - Cursor-pagination parity between mock responses and live responses
      - Cutover plan that keeps hooks and components stable while swapping mock and live
        implementations
      - "React components: TradePolicyViewProvider"
    reuse_candidates:
      - src/services/api.ts
      - src/services/reputational-risk-events.ts
      - src/services/service-provider.tsx
    notes: This is the only frontend item that should absorb backend contract churn. All
      component and hook work should remain behind the V2 service boundary.
