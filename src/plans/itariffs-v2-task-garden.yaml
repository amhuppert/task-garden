version: 1
plan_id: itariffs_v2_hackathon_release
title: iTariffs V2 Hackathon Release
last_updated: 2026-04-01
summary: Artemis-first implementation plan for iTariffs V2. The plan keeps V1 and V2
  alive on the shared /itariffs route until rollout is complete, uses the
  customer-config add-on gate plus a new V2 feature flag, reuses the strongest V1
  primitives where they fit, front-loads frontend progress through a UI-owned
  trade-policy service contract with mock-first implementation, and records backend
  dependencies as explicit work items.
references:
  - label: Focus
    href: memory-bank/focus.md
lanes:
  - id: backend
    label: Backend
    description: Data pipeline, storage, CQE, and API dependencies for iTariffs V2.
  - id: frontend_artemis
    label: Frontend Artemis
    description: Artemis app routing, service layer, and V2 UI implementation.
work_items:
  - id: pipeline_gta_flattening
    title: GTA Flattening
    summary: Deliver the flattened GTA event layer and AI summaries that feed curated
      trade-policy tables for V2.
    lane: backend
    status: planned
    priority: p0
    depends_on: []
    tags:
      - backend
      - data_pipeline
      - dependency
    deliverables:
      - Flattened GTA event records in the data lake
      - AI-generated titles and summaries for trade-policy records
      - "React components served: TradePolicyLandingPage, TradePolicyDetailPage"
    reuse_candidates: []
    notes: Existing ingest and S3 landing already exist; V2 depends on the new flattened
      layer.
  - id: pipeline_trade_policy_curation
    title: Policy Curation
    summary: Build the curated trade-policy layer that drives customer-scoped policy tables
      and CQE consumption.
    lane: backend
    status: blocked
    priority: p0
    depends_on:
      - pipeline_gta_flattening
    tags:
      - backend
      - data_pipeline
      - dependency
    deliverables:
