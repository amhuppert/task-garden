      - Stable mapping of targeted countries, product categories, and HS-code metadata
      - "React components served: TradePolicyLandingPage, TradePolicyDetailPage,
        CountryImpactList, ProductImpactList"
    reuse_candidates: []
    notes: Naming drift exists across notes and Jira; treat the curated output shape as
      still settling.
