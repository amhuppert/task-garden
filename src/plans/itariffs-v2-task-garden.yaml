        exposure section copy and layout
      - Keep the Country or Product toggle, product scope select, tier select, and
        search controls, but bind them to the V2 landing-page state model instead of V1
        query-param assumptions
      - Add the US-focused disclaimer reflecting the separate pipeline from the policy
        feed
