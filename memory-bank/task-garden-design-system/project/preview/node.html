<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Work Item Node</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;padding:0;background:var(--color-background);}
  .card{box-sizing:border-box;width:700px;padding:30px 28px;background:linear-gradient(180deg,var(--color-panel),var(--color-panel-strong));border:1px solid var(--color-border);border-radius:var(--radius-lg);box-shadow:var(--shadow-specimen);background-image:linear-gradient(to right,var(--color-grid) 1px,transparent 1px),linear-gradient(to bottom,var(--color-grid) 1px,transparent 1px);background-size:32px 32px,32px 32px,100% 100%;}
  .row{display:flex;gap:18px;align-items:flex-start;}
  .node{width:220px;min-height:88px;}
  .kicker{font-family:var(--font-mono);font-size:9px;color:var(--color-muted-foreground);text-transform:uppercase;letter-spacing:.18em;}
  .title{font-family:var(--font-sans);font-weight:600;font-size:12px;color:var(--color-foreground);margin-top:4px;line-height:1.25;}
  .footer{display:flex;align-items:center;gap:6px;margin-top:10px;font-family:var(--font-sans);font-size:10px;color:var(--color-muted-foreground);}
  .dot{width:6px;height:6px;border-radius:50%;}
  .accent{position:absolute;top:12px;bottom:12px;left:0;width:3px;border-radius:3px;}
  .pill{border-radius:9999px;font-family:var(--font-mono);font-size:9px;font-weight:700;padding:2px 6px;color:var(--color-primary-foreground);line-height:1;}
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="atlas-node node" style="position:relative;">
      <div class="accent" style="background:var(--color-status-blocked);"></div>
      <div style="display:flex;align-items:flex-start;gap:8px;">
        <div style="flex:1;min-width:0;">
          <div class="kicker">Domain</div>
          <div class="title">Stabilize Auth Contract</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
          <span class="atlas-microchip">3D</span>
          <span class="pill" style="background:var(--color-petal);">P0</span>
        </div>
      </div>
      <div class="footer">
        <span class="dot" style="background:var(--color-status-blocked);"></span>
        <span>Blocked</span>
        <span class="atlas-microchip" style="color:var(--color-pollen);border-color:color-mix(in oklab,var(--color-pollen) 44%, transparent);margin-left:auto;">CRIT</span>
      </div>
    </div>

    <div class="atlas-node atlas-node-selected node" style="position:relative;">
      <div class="accent" style="background:var(--color-status-in-progress);"></div>
      <div style="display:flex;align-items:flex-start;gap:8px;">
        <div style="flex:1;min-width:0;">
          <div class="kicker">UI · seq 04</div>
          <div class="title">Plan Toolbar · selected</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
          <span class="atlas-microchip">1.5D</span>
          <span class="pill" style="background:var(--color-pollen);color:var(--color-foreground);">P1</span>
        </div>
      </div>
      <div class="footer">
        <span class="dot" style="background:var(--color-status-in-progress);"></span>
        <span>In Progress</span>
        <span style="margin-left:auto;font-family:var(--font-mono);font-size:9px;">3.2d chain</span>
      </div>
    </div>

    <div class="atlas-node node" style="position:relative;opacity:.4;">
      <div class="accent" style="background:var(--color-status-done);"></div>
      <div style="display:flex;align-items:flex-start;gap:8px;">
        <div style="flex:1;min-width:0;">
          <div class="kicker">Input</div>
          <div class="title">Plan Registry · context</div>
        </div>
        <span class="pill" style="background:var(--color-moss);">P2</span>
      </div>
      <div class="footer">
        <span class="dot" style="background:var(--color-status-done);"></span>
        <span>Done</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
