<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Logo</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; background: var(--color-background); }
  body { font-family: var(--font-sans); color: var(--color-foreground); }

  .wrap {
    box-sizing: border-box;
    width: 700px;
    padding: 20px 22px;
    background: linear-gradient(180deg, var(--color-panel), var(--color-panel-strong));
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-specimen);
    display: grid;
    grid-template-columns: 232px 1fr;
    gap: 22px;
  }

  /* Left: full-size specimen tag */
  .hero {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    padding: 14px 10px;
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
  }
  .hero img { width: 168px; height: 168px; display: block; }
  .hero .cap {
    font-family: var(--font-mono); font-size: 9px;
    color: var(--color-muted-foreground);
    text-transform: uppercase; letter-spacing: 0.2em;
  }

  /* Right column */
  .col { display: flex; flex-direction: column; gap: 14px; }

  .kicker {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--color-muted-foreground);
    text-transform: uppercase;
    letter-spacing: 0.22em;
    margin: 0 0 6px;
  }

  /* Browser tab mockup — simulates Chrome tab strip at true device pixels */
  .browser {
    border: 1px solid var(--color-border);
    border-radius: 10px 10px 0 0;
    overflow: hidden;
    background: oklch(0.92 0.008 95);
  }
  .tabrow {
    display: flex; align-items: end; gap: 2px;
    padding: 6px 8px 0;
    background: oklch(0.88 0.010 95);
  }
  .tab {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 10px 7px;
    font-size: 11px;
    color: oklch(0.35 0.02 95);
    background: oklch(0.88 0.010 95);
    border-radius: 8px 8px 0 0;
    max-width: 150px;
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
  }
  .tab.active {
    background: oklch(0.97 0.005 95);
    color: oklch(0.2 0.02 95);
    border: 1px solid oklch(0.82 0.01 95);
    border-bottom: none;
  }
  .tab .fav { width: 16px; height: 16px; flex-shrink: 0; image-rendering: -webkit-optimize-contrast; }
  .urlbar {
    background: oklch(0.97 0.005 95);
    padding: 8px 10px;
    border-top: 1px solid oklch(0.82 0.01 95);
    font-family: var(--font-mono);
    font-size: 10px;
    color: oklch(0.45 0.02 95);
  }

  /* Size ladder */
  .ladder {
    display: flex; align-items: end; gap: 14px;
    padding: 12px 14px;
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
  }
  .rung { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .rung img {
    image-rendering: -webkit-optimize-contrast;
    display: block;
    border-radius: 4px;
  }
  .rung .sz {
    font-family: var(--font-mono); font-size: 9px;
    color: var(--color-muted-foreground);
  }
  .rung .ok { color: var(--color-moss-deep); }
  .rung .no { color: var(--color-petal-deep); text-decoration: line-through; }

  /* Swatch card comparing old vs new */
  .compare {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .sw {
    display: flex; align-items: center; gap: 10px;
    padding: 10px;
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
  }
  .sw img.big { width: 40px; height: 40px; border-radius: 6px; image-rendering: -webkit-optimize-contrast; }
  .sw img.small { width: 16px; height: 16px; border-radius: 3px; image-rendering: -webkit-optimize-contrast; }
  .sw .txt {
    display: flex; flex-direction: column; line-height: 1.3;
    font-size: 11px;
  }
  .sw .label { font-weight: 600; color: var(--color-foreground); }
  .sw .sub { font-size: 10px; color: var(--color-muted-foreground); }
  .sw .role {
    font-family: var(--font-mono); font-size: 8.5px;
    color: var(--color-muted-foreground);
    text-transform: uppercase; letter-spacing: 0.18em;
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- Full-size specimen tag -->
  <div class="hero">
    <img src="../assets/logo-512.png" alt="Task Garden specimen-tag logo" />
    <div class="cap">Specimen Tag · ≥64px</div>
  </div>

  <div class="col">
    <!-- Browser tab mockup at true pixel size -->
    <div>
      <div class="kicker">Favicon · shown at true browser size</div>
      <div class="browser">
        <div class="tabrow">
          <div class="tab active">
            <img class="fav" src="../assets/favicon-mark-16.png" alt="" />
            Task Garden
          </div>
          <div class="tab">
            <div style="width:16px;height:16px;background:oklch(0.78 0.02 95);border-radius:2px"></div>
            Inbox (24)
          </div>
          <div class="tab">
            <div style="width:16px;height:16px;background:oklch(0.78 0.02 95);border-radius:2px"></div>
            GitHub
          </div>
        </div>
        <div class="urlbar">task-garden.local / plan / v1</div>
      </div>
    </div>

    <!-- Size ladder: when to use which master -->
    <div>
      <div class="kicker">Scale · pick the right master</div>
      <div class="ladder">
        <div class="rung">
          <img src="../assets/favicon-mark-16.png" width="16" height="16" alt="" />
          <span class="sz ok">16 ✓</span>
        </div>
        <div class="rung">
          <img src="../assets/favicon-mark-32.png" width="32" height="32" alt="" />
          <span class="sz ok">32 ✓</span>
        </div>
        <div class="rung">
          <img src="../assets/favicon-mark-64.png" width="48" height="48" alt="" />
          <span class="sz ok">48 ✓</span>
        </div>
        <div class="rung">
          <img src="../assets/logo-512.png" width="48" height="48" alt="" />
          <span class="sz no">48</span>
        </div>
        <div class="rung">
          <img src="../assets/logo-512.png" width="72" height="72" alt="" />
          <span class="sz ok">72 ✓</span>
        </div>
        <div class="rung">
          <img src="../assets/logo-512.png" width="112" height="112" alt="" />
          <span class="sz ok">112 ✓</span>
        </div>
      </div>
    </div>

    <!-- Old vs new comparison at favicon size -->
    <div class="compare">
      <div class="sw">
        <img class="small" src="../assets/logo-512.png" alt="" />
        <div class="txt">
          <span class="role">At 16px</span>
          <span class="label">Tag — illegible</span>
          <span class="sub">Bark frame + "TG" serif both mush</span>
        </div>
      </div>
      <div class="sw">
        <img class="small" src="../assets/favicon-mark-16.png" alt="" />
        <div class="txt">
          <span class="role">At 16px</span>
          <span class="label">Moss "T" — legible</span>
          <span class="sub">Solid fill, one glyph, high contrast</span>
        </div>
      </div>
    </div>

  </div>
</div>
</body>
</html>
