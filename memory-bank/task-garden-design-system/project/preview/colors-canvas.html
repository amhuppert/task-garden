<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Colors · Canvas &amp; Surfaces</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:var(--color-background);}
  .card{box-sizing:border-box;width:700px;padding:24px 28px;background:linear-gradient(180deg,var(--color-panel),var(--color-panel-strong));border:1px solid var(--color-border);border-radius:var(--radius-lg);box-shadow:var(--shadow-specimen);}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .sw{border-radius:var(--radius-md);border:1px solid var(--color-border);padding:10px 12px;min-height:84px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:inset 0 1px 0 color-mix(in oklab,white 40%,transparent);}
  .name{font-family:var(--font-sans);font-size:12px;font-weight:600;color:var(--color-foreground);}
  .tok{font-family:var(--font-mono);font-size:10px;color:var(--color-muted-foreground);text-transform:uppercase;letter-spacing:.14em;}
  h3{font-family:var(--font-display);font-size:18px;font-weight:600;margin:0 0 12px 0;color:var(--color-foreground);letter-spacing:-.02em;}
</style>
</head>
<body>
<div class="card">
  <h3>Canvas &amp; surfaces</h3>
  <div class="row">
    <div class="sw" style="background:var(--color-background);"><span class="name">Background</span><span class="tok">--color-background</span></div>
    <div class="sw" style="background:var(--color-surface);"><span class="name">Surface</span><span class="tok">--color-surface</span></div>
    <div class="sw" style="background:var(--color-surface-strong);"><span class="name">Surface Strong</span><span class="tok">--surface-strong</span></div>
    <div class="sw" style="background:var(--color-surface-muted);"><span class="name">Surface Muted</span><span class="tok">--surface-muted</span></div>
  </div>
</div>
</body>
</html>
